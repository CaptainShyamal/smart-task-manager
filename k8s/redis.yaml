apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: smart-task-manager
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-task-manager
      tier: cache
  template:
    metadata:
      labels:
        app: smart-task-manager
        tier: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: smart-task-manager
    tier: cache
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
